policy:
  thresholds:
    observe: 0
    collect_more: 20
    soft_response: 50
    active_response: 70
    critical_response: 90
  evidence:
    min_events_for_response: 1
    min_sources_for_active_response: 1
    require_event_id_mapping: true
    require_timeline_order: true
  safety:
    require_ttl: true
    require_rollback: true
    protect_allowlist: true
    dry_run_default: false
  allowlists:
    ips:
    - 127.0.0.1
    - ::1
    cidrs: []
    accounts:
    - root
    process_names:
    - systemd
    - sshd
    - nginx
    - apache2
    - httpd
    - mysqld
    - postgresql
    - dockerd
    - containerd
  drone:
    defense_only: true
    forbidden_agent_actions:
    - arm
    - disarm
    - takeoff
    - land
    - mission_upload
    - parameter_write
    - rc_override
    - mavlink_command_send
  actions:
    block_ip_ttl:
      enabled: true
      auto_allowed: true
      min_score: 50
      risk: medium
      ttl_required: true
      rollback_required: true
    rate_limit_ip:
      enabled: true
      auto_allowed: true
      min_score: 45
      risk: low
      ttl_required: true
      rollback_required: true
    block_outbound_ip:
      enabled: true
      auto_allowed: true
      min_score: 70
      risk: medium
      ttl_required: true
      rollback_required: true
    suspend_process:
      enabled: false
      auto_allowed: false
      min_score: 95
      risk: high_guarded
      ttl_required: false
      rollback_required: true
      require_auditd_pid_relation: true
    kill_process:
      enabled: false
      auto_allowed: false
      min_score: 95
      risk: critical
      ttl_required: false
      rollback_required: false
    quarantine_file:
      enabled: true
      auto_allowed: true
      min_score: 75
      risk: medium
      ttl_required: false
      rollback_required: true
    disable_persistence:
      enabled: true
      auto_allowed: true
      min_score: 85
      risk: high
      ttl_required: false
      rollback_required: true
    restrict_account:
      enabled: false
      auto_allowed: false
      min_score: 90
      risk: critical
      ttl_required: false
      rollback_required: true
    isolate_host:
      enabled: false
      auto_allowed: false
      min_score: 95
      risk: critical
      ttl_required: true
      rollback_required: true
